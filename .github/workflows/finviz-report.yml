name: Finviz Daily Report

on:
  schedule:
    - cron: "30 13 * * 1-5"
    - cron: "30 14 * * 1-5"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check New York market time gate
        id: market_time
        run: |
          ny_time=$(TZ=America/New_York date +'%u %H:%M')
          ny_day=$(echo "$ny_time" | awk '{print $1}')
          ny_clock=$(echo "$ny_time" | awk '{print $2}')
          echo "NY time now: $ny_time"
          if [ "$ny_day" -ge 1 ] && [ "$ny_day" -le 5 ] && [ "$ny_clock" = "09:30" ]; then
            echo "run_report=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_report=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.market_time.outputs.run_report == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.market_time.outputs.run_report == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run report and send email
        if: steps.market_time.outputs.run_report == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          REPORT_RECIPIENTS: ${{ secrets.REPORT_RECIPIENTS }}
        run: |
          python scripts/finviz_report.py

      - name: Upload report artifacts
        if: steps.market_time.outputs.run_report == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: finviz-report-${{ github.run_id }}
          path: reports/*.json
