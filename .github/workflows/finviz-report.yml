name: Finviz Daily Report

on:
  schedule:
    # Run both possible UTC times for 10:00 AM New York (DST-safe).
    - cron: "0 14 * * 1-5"
    - cron: "0 15 * * 1-5"
  workflow_dispatch:

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check New York market time gate
        id: market_time
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run_report=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          ny_time=$(TZ=America/New_York date +'%u %H:%M')
          ny_day=$(echo "$ny_time" | awk '{print $1}')
          ny_clock=$(echo "$ny_time" | awk '{print $2}')
          ny_hour=$(echo "$ny_clock" | cut -d: -f1)
          ny_min=$(echo "$ny_clock" | cut -d: -f2)
          echo "NY time now: $ny_time"
          # Allow a practical run window around 10:00 AM New York time.
          if [ "$ny_day" -ge 1 ] && [ "$ny_day" -le 5 ] && [ "$ny_hour" = "10" ] && [ "$ny_min" -ge 0 ] && [ "$ny_min" -le 30 ]; then
            echo "run_report=true" >> "$GITHUB_OUTPUT"
          else
            echo "run_report=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.market_time.outputs.run_report == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        if: steps.market_time.outputs.run_report == 'true'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run report and send email
        if: steps.market_time.outputs.run_report == 'true'
        env:
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_FROM: ${{ secrets.SMTP_FROM }}
          REPORT_RECIPIENTS: aaggarwal0826@gmail.com
        run: |
          python scripts/finviz_report.py

      - name: Upload report artifacts
        if: steps.market_time.outputs.run_report == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: finviz-report-${{ github.run_id }}
          path: reports/*.json
